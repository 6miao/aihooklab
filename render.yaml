services:
  - type: web
    name: aihooklab
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: NODE_VERSION
        value: 22.11.0
